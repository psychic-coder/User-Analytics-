version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: analytics-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: analytics-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/analytics_db
      - CLIENT_URL=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: analytics-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy

  tracker:
    build:
      context: ./apps/tracker
      dockerfile: Dockerfile
    container_name: analytics-tracker
    ports:
      - "3001:3000"

volumes:
  mongodb_data:
