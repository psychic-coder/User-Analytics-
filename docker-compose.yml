services:
  backend:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: analytics-backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - CLIENT_URL=http://localhost:3000
    env_file:
      - ./apps/server/.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5001/api
    container_name: analytics-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  tracker:
    build:
      context: ./apps/tracker
      dockerfile: Dockerfile
    container_name: analytics-tracker
    ports:
      - "3001:3000"
